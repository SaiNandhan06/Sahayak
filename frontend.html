<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sahayak – AI Financial Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Design Tokens ─────────────────────────────────────────── */
    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --surface2:    #21262d;
      --border:      #30363d;
      --accent:      #2563eb;
      --accent-glow: rgba(37, 99, 235, 0.25);
      --accent2:     #10b981;
      --text:        #e6edf3;
      --text-muted:  #8b949e;
      --user-bg:     #1d3557;
      --bot-bg:      #1a2332;
      --danger:      #f85149;
      --radius:      14px;
      --font:        'Inter', sans-serif;
    }

    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0;
    }

    /* ── Header ────────────────────────────────────────────────── */
    header {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    .header-left { display: flex; align-items: center; gap: 12px; }

    .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 16px var(--accent-glow);
    }

    .header-title h1 {
      font-size: 18px; font-weight: 700;
      background: linear-gradient(90deg, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-title p { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

    .status-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Main layout ───────────────────────────────────────────── */
    .container {
      display: flex;
      width: 100%;
      max-width: 1100px;
      height: calc(100vh - 65px);
      padding: 20px;
      gap: 16px;
    }

    /* ── Sidebar ───────────────────────────────────────────────── */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .sidebar-card h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .session-info { display: flex; flex-direction: column; gap: 8px; }

    .session-label { font-size: 12px; color: var(--text-muted); }

    .session-id-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 500;
      color: #60a5fa;
      letter-spacing: .02em;
      word-break: break-all;
    }

    .btn {
      width: 100%;
      padding: 9px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      transition: all .2s ease;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }

    .btn-danger {
      background: rgba(248, 81, 73, 0.15);
      color: var(--danger);
      border: 1px solid rgba(248, 81, 73, 0.3);
    }

    .btn-danger:hover {
      background: rgba(248, 81, 73, 0.25);
      border-color: var(--danger);
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--border);
      color: var(--text);
    }

    .suggestions h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .suggestion-chip {
      display: block;
      width: 100%;
      text-align: left;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      margin-bottom: 7px;
      transition: all .2s;
      font-family: var(--font);
    }

    .suggestion-chip:hover {
      border-color: var(--accent);
      color: #60a5fa;
      background: rgba(37, 99, 235, 0.08);
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 4px 0;
    }

    .stat-row .label { color: var(--text-muted); }
    .stat-row .value { font-weight: 600; color: var(--accent2); }

    /* ── Chat Area ─────────────────────────────────────────────── */
    .chat-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Welcome screen ────────────────────────────────────────── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      gap: 16px;
      padding: 40px;
    }

    .welcome-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px;
      box-shadow: 0 0 32px var(--accent-glow);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }

    .welcome h2 { font-size: 22px; font-weight: 700; }
    .welcome p  { font-size: 14px; color: var(--text-muted); max-width: 400px; line-height: 1.6; }

    .welcome-chips {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
      margin-top: 8px;
    }

    .welcome-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text-muted);
      transition: all .2s;
      font-family: var(--font);
    }

    .welcome-chip:hover {
      border-color: var(--accent);
      color: #60a5fa;
      background: rgba(37, 99, 235, 0.1);
    }

    /* ── Message Bubbles ───────────────────────────────────────── */
    .msg { display: flex; gap: 10px; max-width: 82%; animation: fadeIn .25s ease; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }

    .msg.user .avatar {
      background: linear-gradient(135deg, var(--accent), #7c3aed);
    }

    .msg.bot .avatar {
      background: linear-gradient(135deg, var(--accent2), #0891b2);
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.65;
      max-width: 100%;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid rgba(37,99,235,0.3);
      border-top-right-radius: 4px;
      color: #dbeafe;
    }

    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    .msg-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
      text-align: right;
    }

    .msg.bot .msg-time { text-align: left; }

    /* ── Typing indicator ──────────────────────────────────────── */
    .typing-indicator {
      display: flex; gap: 10px; align-self: flex-start; align-items: flex-end;
    }

    .typing-bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-top-left-radius: 4px;
      padding: 14px 18px;
      display: flex; gap: 5px; align-items: center;
    }

    .typing-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-7px); }
    }

    /* ── Input Area ────────────────────────────────────────────── */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-wrap {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: flex-end;
      padding: 10px 14px;
      gap: 8px;
      transition: border-color .2s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #msg-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }

    #msg-input::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border: none; border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: all .2s;
      flex-shrink: 0;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .send-btn:hover  { transform: scale(1.08); box-shadow: 0 0 20px var(--accent-glow); }
    .send-btn:active { transform: scale(0.96); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Error toast ───────────────────────────────────────────── */
    .error-toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: rgba(248,81,73,0.15);
      border: 1px solid rgba(248,81,73,0.5);
      color: #fca5a5;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 999;
      animation: fadeIn .3s ease;
    }

    /* ── Responsive ────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .container { padding: 10px; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────── -->
<header>
  <div class="header-left">
    <div class="logo">💰</div>
    <div class="header-title">
      <h1>Sahayak</h1>
      <p>AI Financial Assistant</p>
    </div>
  </div>
  <div class="status-badge">
    <div class="status-dot"></div>
    <span id="status-text">Connecting…</span>
  </div>
</header>

<!-- ── Main Container ───────────────────────────────────────────────── -->
<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Session -->
    <div class="sidebar-card">
      <h3>Session</h3>
      <div class="session-info">
        <span class="session-label">Session ID</span>
        <div class="session-id-box" id="session-id-display">—</div>
        <button class="btn btn-secondary" onclick="newSession()">🔄 New Session</button>
        <button class="btn btn-danger" id="clear-btn" onclick="clearHistory()" disabled>🗑 Clear History</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="sidebar-card">
      <h3>Stats</h3>
      <div class="stat-row"><span class="label">Messages</span><span class="value" id="stat-msgs">0</span></div>
      <div class="stat-row"><span class="label">Your turns</span><span class="value" id="stat-user">0</span></div>
      <div class="stat-row"><span class="label">Bot turns</span><span class="value" id="stat-bot">0</span></div>
    </div>

    <!-- Quick prompts -->
    <div class="sidebar-card suggestions">
      <h3>Quick Prompts</h3>
      <button class="suggestion-chip" onclick="usePrompt(this)">🍕 Track food expenses</button>
      <button class="suggestion-chip" onclick="usePrompt(this)">💰 Apps to save money</button>
      <button class="suggestion-chip" onclick="usePrompt(this)">☕ Categorize Starbucks ₹500</button>
      <button class="suggestion-chip" onclick="usePrompt(this)">📊 50/30/20 budgeting rule</button>
      <button class="suggestion-chip" onclick="usePrompt(this)">🔔 How do overspend alerts work?</button>
      <button class="suggestion-chip" onclick="usePrompt(this)">📱 What is CRED?</button>
    </div>

  </aside>

  <!-- Chat -->
  <div class="chat-wrapper">

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🤖</div>
        <h2>Namaste! I'm Sahayak 🙏</h2>
        <p>Your AI-powered personal finance assistant for tracking expenses, budgeting, and discovering the best Indian fintech apps.</p>
        <div class="welcome-chips">
          <button class="welcome-chip" onclick="usePrompt(this)">🍕 Track food expenses</button>
          <button class="welcome-chip" onclick="usePrompt(this)">💰 Apps to save money</button>
          <button class="welcome-chip" onclick="usePrompt(this)">☕ Categorize Starbucks ₹500</button>
          <button class="welcome-chip" onclick="usePrompt(this)">📊 50/30/20 rule explained</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea id="msg-input"
          placeholder="Ask Sahayak about your finances…"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)">
        </textarea>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send (Enter)">🚀</button>
    </div>

  </div>
</div>

<script>
  // ── Config ────────────────────────────────────────────────────────────
  const API_BASE = 'http://localhost:8000';

  // ── State ─────────────────────────────────────────────────────────────
  let sessionId = generateId();
  let msgCount = 0, userCount = 0, botCount = 0;
  let isLoading = false;

  // ── Init ──────────────────────────────────────────────────────────────
  document.getElementById('session-id-display').textContent = sessionId;
  checkHealth();

  function generateId() {
    return 'session_' + Math.random().toString(36).slice(2, 10);
  }

  // ── Health check ──────────────────────────────────────────────────────
  async function checkHealth() {
    try {
      const r = await fetch(`${API_BASE}/health`);
      if (r.ok) {
        document.getElementById('status-text').textContent = 'Sahayak Online';
      } else {
        setOffline();
      }
    } catch {
      setOffline();
    }
  }

  function setOffline() {
    document.getElementById('status-text').textContent = 'Server Offline';
    document.querySelector('.status-dot').style.background = '#f85149';
  }

  // ── Send message ──────────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || isLoading) return;

    hideWelcome();
    appendMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    updateStats('user');

    const typing = showTyping();
    setLoading(true);

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });

      removeTyping(typing);

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        showError(err.detail || `Server error ${res.status}`);
        return;
      }

      const data = await res.json();
      appendMessage('bot', data.response);
      updateStats('bot');
      document.getElementById('clear-btn').disabled = false;

    } catch (e) {
      removeTyping(typing);
      showError('Cannot reach server. Is uvicorn running?');
    } finally {
      setLoading(false);
    }
  }

  // ── Clear history ─────────────────────────────────────────────────────
  async function clearHistory() {
    try {
      await fetch(`${API_BASE}/history/${sessionId}`, { method: 'DELETE' });
    } catch {}
    const msgs = document.getElementById('messages');
    msgs.innerHTML = '';
    showWelcome();
    msgCount = userCount = botCount = 0;
    updateStatsDisplay();
    document.getElementById('clear-btn').disabled = true;
  }

  // ── New session ───────────────────────────────────────────────────────
  async function newSession() {
    await clearHistory();
    sessionId = generateId();
    document.getElementById('session-id-display').textContent = sessionId;
  }

  // ── DOM helpers ───────────────────────────────────────────────────────
  function appendMessage(role, text) {
    const msgs = document.getElementById('messages');
    const time = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    const avatar = role === 'user' ? '👤' : '🤖';

    const wrapper = document.createElement('div');
    wrapper.className = `msg ${role}`;
    wrapper.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div>
        <div class="bubble">${escapeHtml(text)}</div>
        <div class="msg-time">${time}</div>
      </div>`;
    msgs.appendChild(wrapper);
    msgs.scrollTop = msgs.scrollHeight;
    msgCount++;
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const el = document.createElement('div');
    el.className = 'typing-indicator';
    el.id = 'typing';
    el.innerHTML = `
      <div class="avatar" style="background:linear-gradient(135deg,#10b981,#0891b2)">🤖</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>`;
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
    return el;
  }

  function removeTyping(el) { if (el && el.parentNode) el.remove(); }

  function hideWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function showWelcome() {
    const msgs = document.getElementById('messages');
    msgs.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🤖</div>
        <h2>Namaste! I'm Sahayak 🙏</h2>
        <p>Your AI-powered personal finance assistant.</p>
        <div class="welcome-chips">
          <button class="welcome-chip" onclick="usePrompt(this)">🍕 Track food expenses</button>
          <button class="welcome-chip" onclick="usePrompt(this)">💰 Apps to save money</button>
          <button class="welcome-chip" onclick="usePrompt(this)">☕ Categorize Starbucks ₹500</button>
          <button class="welcome-chip" onclick="usePrompt(this)">📊 50/30/20 rule explained</button>
        </div>
      </div>`;
  }

  function usePrompt(btn) {
    const text = btn.textContent.replace(/^[\p{Emoji}\s]+/u, '').trim();
    const input = document.getElementById('msg-input');
    input.value = text;
    input.focus();
    autoResize(input);
  }

  function setLoading(v) {
    isLoading = v;
    document.getElementById('send-btn').disabled = v;
  }

  function showError(msg) {
    const t = document.createElement('div');
    t.className = 'error-toast';
    t.textContent = '⚠️ ' + msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4000);
  }

  function updateStats(role) {
    if (role === 'user') userCount++;
    else botCount++;
    updateStatsDisplay();
  }

  function updateStatsDisplay() {
    document.getElementById('stat-msgs').textContent = msgCount;
    document.getElementById('stat-user').textContent = userCount;
    document.getElementById('stat-bot').textContent = botCount;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }
</script>
</body>
</html>
